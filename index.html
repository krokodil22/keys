<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Клавиатурный тренажёр — выбор сложности</title>
  <style>
    :root{--bg:#f1f5f9; --panel:#fff; --text:#0f172a; --sub:#475569; --accent:#7c3aed; --border:#e2e8f0}
    *{box-sizing:border-box}
    body{margin:0; min-height:100vh; font-family:system-ui,-apple-system,Segoe UI,Roboto; color:var(--text); background:var(--bg)}
    .wrap{max-width:980px; margin:0 auto; padding:28px 16px 36px}
    .hero{display:flex; align-items:center; gap:12px; margin-bottom:18px}
    h1{margin:0; font-size:30px}
    .sub{margin:0; color:var(--sub)}
    .grid{margin-top:22px; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px}
    .card{display:block; text-decoration:none; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px 16px; color:var(--text); transition:.15s ease}
    .card:hover{transform:translateY(-2px); border-color:#c4b5fd; box-shadow:0 8px 24px rgba(124,58,237,.15)}
    .lvl{font-size:18px; font-weight:700}
    .lvl-note{font-size:14px; font-weight:500; color:#64748b}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <img src="logo.webp" alt="logo" style="height:36px;width:auto" />
      <h1>Клавиатурный тренажёр</h1>
    </div>
    <p class="sub">Выберите сложность, чтобы начать. Внутри тренажёра можно переключаться между сложностями через выпадающий список.</p>

    <div class="grid">
      <a class="card" href="difficulty-1.html?nav=1"><div class="lvl">М1У1 <br> <span class="lvl-note">(Сложность 1)</span></div></a>
      <a class="card" href="difficulty-2.html?nav=1"><div class="lvl">М1У2  <br> <span class="lvl-note">(Сложность 2)</span></div></a>
      <a class="card" href="difficulty-3.html?nav=1"><div class="lvl">М1У3 <br>  <span class="lvl-note">(Сложность 3)</span></div></a>
      <a class="card" href="difficulty-4.html?nav=1"><div class="lvl">М1У4  <br> <span class="lvl-note">(Сложность 4)</span></div></a>
      <br>
      <a class="card" href="difficulty-5.html?nav=1"><div class="lvl">Сложность 5</div></a>
      <a class="card" href="difficulty-6.html?nav=1"><div class="lvl">Сложность 6</div></a>
      <a class="card" href="difficulty-7.html?nav=1"><div class="lvl">Сложность 7</div></a>
    </div>
  </div>
</body>
</html>
